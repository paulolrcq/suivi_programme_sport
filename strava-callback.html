<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Strava...</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#e8eaf0; font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .box { text-align:center; padding:48px; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:48px; color:#FC4C02; margin-bottom:8px; }
  .sub { font-size:14px; color:#7a8099; margin-bottom:32px; }
  .spinner { width:40px; height:40px; border:3px solid #2a2f3a; border-top-color:#FC4C02; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 24px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .status { font-size:14px; color:#7a8099; font-family:'DM Mono',monospace; }
  .error { color:#ff6b63; font-size:14px; margin-top:16px; }
  .success { color:#5df59a; font-size:14px; margin-top:16px; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">STRAVA</div>
  <div class="sub">Connexion en cours…</div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Échange du code d'autorisation…</div>
  <div id="message"></div>
</div>

<script>
  // ── CONFIG — récupérée depuis localStorage (remplie dans index.html) ──
  const CLIENT_ID     = localStorage.getItem('strava_client_id');
  const CLIENT_SECRET = localStorage.getItem('strava_client_secret');

  async function handleCallback() {
    const params  = new URLSearchParams(window.location.search);
    const code    = params.get('code');
    const error   = params.get('error');

    if (error || !code) {
      showError(error === 'access_denied'
        ? 'Tu as refusé l\'accès Strava. Retourne sur l\'app et réessaie.'
        : 'Erreur lors de la connexion Strava : ' + (error || 'code manquant'));
      return;
    }

    if (!CLIENT_ID || !CLIENT_SECRET) {
      showError('Client ID ou Secret manquant. Configure-les dans l\'onglet Course de ton programme.');
      return;
    }

    document.getElementById('status').textContent = 'Échange du token avec Strava…';

    try {
      const res = await fetch('https://www.strava.com/oauth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          client_id:     CLIENT_ID,
          client_secret: CLIENT_SECRET,
          code:          code,
          grant_type:    'authorization_code'
        })
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      if (data.errors) throw new Error(data.message);

      // Sauvegarder les tokens
      localStorage.setItem('strava_access_token',  data.access_token);
      localStorage.setItem('strava_refresh_token', data.refresh_token);
      localStorage.setItem('strava_expires_at',    data.expires_at);
      localStorage.setItem('strava_athlete',       JSON.stringify(data.athlete));

      document.getElementById('spinner').style.borderTopColor = '#5df59a';
      document.getElementById('status').textContent = 'Connecté ! Redirection…';
      document.getElementById('message').innerHTML = '<div class="success">✓ Compte lié : ' + data.athlete.firstname + ' ' + data.athlete.lastname + '</div>';

      setTimeout(() => { window.location.href = 'index.html#course'; }, 1500);

    } catch (err) {
      showError('Erreur : ' + err.message);
    }
  }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').textContent = '';
    document.getElementById('message').innerHTML = '<div class="error">⚠ ' + msg + '<br><br><a href="index.html" style="color:#FC4C02;text-decoration:none;">← Retour au programme</a></div>';
  }

  handleCallback();
</script>
</body>
</html>
